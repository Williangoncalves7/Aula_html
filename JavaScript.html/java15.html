<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{width: 100px; height: 100px; border: 1px solid;}
    </style>
</head>
<body>
    <div>Texto</div>
    <script>
        let quadrado = document.querySelector('div')
        quadrado.addEventListener('mouseenter', function(){
            quadrado.style.backgroundColor = 'red';
        })
        quadrado.addEventListener('mouseleave', function(){
            quadrado.style.backgroundColor = '';
        })
    </script>
</body>
</html>

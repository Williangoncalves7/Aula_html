<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let pares = 0;
        let impares = 0;
        let maioresQue10 = 0;

        for (let i = 1; i <= 10; i++) {
            let num = parseInt(prompt("Digite um número"));
            
            if (num % 2 === 0) {
                pares++;
            } else {
                impares++;
            } 
            
            if (num > 10){
                maioresQue10++;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let codigo = parseInt(prompt("informe o código do produto"));

    switch (codigo) {
        case 1:
            alert("Alimento não perecível");
            break;
        case 2:
            alert("Alimento perecível");
            break;
        case 3:
            alert("Vestuário");
            break;
        case 4:
            alert("Higiene Pessoal");
            break;
        case 5:
            alert("Limpeza e untensílios doméstico");
            break;
        case 6:
            alert("Eletronicos");
            break;
        case 7:
            alert("Informática");
            break;
        default:
            alert("Código inválido");
        }
    </script>
</body>
</html>
